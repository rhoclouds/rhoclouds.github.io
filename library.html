<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/icons/blazePowder32x32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/icons/blazePowder192x192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="/icons/blazePowderAppleTouchIcon.png">
    <link rel="shortcut icon" href="/icons/blazePowder.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>library - rhoclouds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/static-styles.css">
    <link rel="stylesheet" href="/css/nav.css">

<style>
  .container {
    width: 80%;
    max-width: 1000px;
    margin-bottom: 2rem;
  }

  .card {
    max-width: none;
    padding: 1.5rem;
  }

  .book-section-label {
    font-weight: normal;
    font-size: 1.5rem;
    margin-bottom: 1rem;
    text-align: center;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 6px 24px rgba(0,0,0,0.22);
  }

  .card h2.book-section-label {
  font-weight: normal;
  text-align: center;
  border-bottom: none;
  max-width: none;
  padding-bottom: 0;
  margin: 0 0 1rem;
}

  .book-grid {
    display: grid;
    gap: 20px;
    margin-top: 1rem;
  }

  .shelf-1,
  .shelf-2,
  .shelf-3 {
    grid-template-columns: repeat(5, 1fr);
  }

  .book {
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(0,0,0,0.14);
    border-radius: 5px;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    aspect-ratio: 2 / 3;
  }

  .book:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 36px rgba(0,0,0,0.26);
  }

  .book img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  @media (max-width: 480px) {
    .container {
      width: 95%;
    }
  }

  @media (max-width: 640px) {
    .card {
      border-radius: 20px;
    }

    .card::before {
      border-radius: 19px;
    }

    .card::after {
      border-radius: 20px;
    }

    .book-grid.shelf-1,
    .book-grid.shelf-2,
    .book-grid.shelf-3 {
      grid-template-columns: repeat(3, 1fr);
    }
  }
</style>

</head>
<body>
  <div class="wrapper">
      <nav>
        <a href="https://rhoclouds.github.io/">home</a>
        <a href="/library.html">library</a>
        <a href="/blog.html">blog</a>
        <a href="/projects.html">projects</a>
      </nav>
    </header>

    <div class="content">
      <div class="container">

        <div class="card">
          <h2 class="book-section-label">21st century novels</h2>
          <div class="book-grid shelf-1">
            <div class="book"><img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Placeholder"></div>
            <div class="book"><img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Placeholder"></div>
            <div class="book"><img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Placeholder"></div>
            <div class="book"><img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Placeholder"></div>
            <div class="book"><img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Placeholder"></div>
          </div>
        </div>

        <div class="card">
          <h2 class="book-section-label">favorites</h2>
          <div class="book-grid shelf-2">
            <div class="book"><img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Placeholder"></div>
            <div class="book"><img src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1650033243i/41733839.jpg" alt="The Great Gatsby"></div>
            <div class="book"><img src="https://m.media-amazon.com/images/I/61YiceYntAL._SL1500_.jpg" alt="Duino Elegies & The Sonnets to Orpheus"></div>
            <div class="book"><img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Placeholder"></div>
            <div class="book"><img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Placeholder"></div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
